name: Backend CI (Monorepo)

on:
  pull_request:
  push:
    branches:
      - main
      - gitops-migration

permissions:
  contents: write
  packages: write
  security-events: write
  pull-requests: write
  actions: read # Required to fetch logs via GH CLI

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Stage 1: Testing ---
  test:
    name: Test - ${{ matrix.svc.name }}
    strategy:
      fail-fast: false
      matrix:
        svc: &services
          - name: auth
            pom_path: Auth/apps/pom.xml
            workdir: Auth/apps
            sonar_key: apps
            dockerfile: Auth/apps/Dockerfile
            image_name: auth
            manifest: auth.yaml
            regex: "image:.*/auth:"
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-test.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      reports_artifact_name: test-reports-${{ matrix.svc.name }}
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 2: Quality (Only on Main) ---
  sonar:
    name: Sonar - ${{ matrix.svc.name }}
    needs: test
    if: ${{ github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/sonarqube-analysis.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      workdir: ${{ matrix.svc.workdir }}
      sonar_project_key: ${{ matrix.svc.sonar_key }}
      run_quality_gate: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORG_KEY: ${{ secrets.SONAR_ORG_KEY }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 3: Build Artifacts ---
  build:
    name: Build - ${{ matrix.svc.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-build.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      build_command: "mvn -B clean package -DskipTests"
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 4: Docker & GitOps ---
  docker:
    name: Docker - ${{ matrix.svc.name }}
    needs: build
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/docker-build-push.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      image_name: ${{ matrix.svc.image_name }}
      context: ${{ matrix.svc.workdir }}
      dockerfile: ${{ matrix.svc.dockerfile }}
      push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}
      update_manifests: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}
      manifest_file: ${{ matrix.svc.manifest }}
      manifest_image_regex: ${{ matrix.svc.regex }}
    secrets:
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      LOCAL_ECR_CA: ${{ secrets.LOCAL_ECR_CA }}

  # --- Stage 5: Log Collection ---
  collect_logs:
    name: Collect Pipeline Logs
    runs-on: [ self-hosted, linux ]
    needs: [ test, sonar, build, docker ]
    if: |
      always() && !cancelled() &&
      (needs.test.result == 'failure' || needs.build.result == 'failure' ||
       needs.docker.result == 'failure' || needs.sonar.result == 'failure')

    steps:
      - name: Fetch Failed Job Logs via API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching failed job IDs from this run..."

          # Get all jobs in this run and find the ones that failed
          FAILED_JOB_IDS=$(gh api \
            /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .id')

          if [ -z "$FAILED_JOB_IDS" ]; then
            echo "No failed jobs found via API. Trying 'in_progress' jobs..."
            FAILED_JOB_IDS=$(gh api \
              /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
              --jq '.jobs[] | select(.conclusion != "success" and .conclusion != "skipped") | .id')
          fi

          echo "Failed Job IDs: $FAILED_JOB_IDS"
          echo "" > maven_output.log

          # Fetch logs for each failed job individually by job ID
          for JOB_ID in $FAILED_JOB_IDS; do
            echo "==== Fetching logs for Job ID: $JOB_ID ====" >> maven_output.log
            gh api /repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs >> maven_output.log 2>&1 || true
            echo "" >> maven_output.log
          done


          # VERIFICATION
          echo "Final log file size: $(wc -c < maven_output.log) bytes"
          head -n 20 maven_output.log

      - name: Upload Logs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: maven_output.log
          retention-days: 1

  # --- Stage 6: AI RCA Analysis ---
  ai_analysis:
    name: AI Root-Cause Analysis
    runs-on: [ self-hosted, linux ]
    needs: collect_logs
    if: ${{ always() && needs.collect_logs.result == 'success' }}
    outputs:
      summary: ${{ steps.load_rca.outputs.summary }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Logs Artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-logs

      - name: Run AI RCA with Copilot
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/ai_analyze.sh

      - name: Load AI Summary
        id: load_rca
        shell: bash
        run: |
          if [ -s ai_summary.txt ]; then
            sed -i 's/\x1b\[[0-9;]*m//g' ai_summary.txt
            echo "AI Summary found. Loading to output."
            {
              echo "summary<<EOF"
              cat ai_summary.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "summary=RCA could not identify the specific cause. Check raw logs." >> "$GITHUB_OUTPUT"
          fi

      - name: Upload AI RCA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-rca
          path: |
            ai_summary.txt
            maven_output.log

  # --- Stage 7: Centralized Notification ---
  notify_failure:
    name: Notify Teams
    needs: ai_analysis
    if: |
      always() &&
      needs.ai_analysis.result != 'skipped' &&
      needs.ai_analysis.result != 'cancelled'
    uses: Bhuvaneshwaran-17/central-devops-tooling/.github/workflows/teams-notifier.yml@main
    with:
      project_name: ${{ github.repository }}
      component_name: "auth"
      job_name: "Pipeline Failure Analysis"
      status: "failure"
      rca: ${{ needs.ai_analysis.outputs.summary }}
    secrets:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}