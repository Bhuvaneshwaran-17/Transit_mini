name: Backend CI (Monorepo)

on:
  pull_request:
  push:
    branches:
      - main
      - gitops-migration

permissions:
  contents: write
  packages: write
  security-events: write
  pull-requests: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Stage 1: Testing ---
  test:
    name: Test - ${{ matrix.svc.name }}
    strategy:
      fail-fast: false
      matrix:
        svc: &services
          - name: auth
            pom_path: Auth/apps/pom.xml
            workdir: Auth/apps
            sonar_key: apps
            dockerfile: Auth/apps/Dockerfile
            image_name: auth
            manifest: auth.yaml
            regex: "image:.*/auth:"
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-test.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      reports_artifact_name: test-reports-${{ matrix.svc.name }}
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 2: Quality (Only on Main) ---
  sonar:
    name: Sonar - ${{ matrix.svc.name }}
    needs: test
    if: ${{ github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/sonarqube-analysis.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      workdir: ${{ matrix.svc.workdir }}
      sonar_project_key: ${{ matrix.svc.sonar_key }}
      run_quality_gate: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORG_KEY: ${{ secrets.SONAR_ORG_KEY }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 3: Build Artifacts ---
  build:
    name: Build - ${{ matrix.svc.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-build.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      build_command: "mvn -B clean package -DskipTests"
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 4: Docker & GitOps ---
  docker:
    name: Docker - ${{ matrix.svc.name }}
    needs: build
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/docker-build-push.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      image_name: ${{ matrix.svc.image_name }}
      context: ${{ matrix.svc.workdir }}
      dockerfile: ${{ matrix.svc.dockerfile }}
      push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}
      update_manifests: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}
      manifest_file: ${{ matrix.svc.manifest }}
      manifest_image_regex: ${{ matrix.svc.regex }}
    secrets:
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      LOCAL_ECR_CA: ${{ secrets.LOCAL_ECR_CA }}

  # --- Stage 5: AI RCA Analysis ---
  ai_log_analysis:
    name: AI Root-Cause Analysis
    runs-on: ubuntu-latest
    needs: [test, sonar, build, docker]
    # EITHER keep your explicit condition:
    if: ${{ always() && !cancelled() && contains(needs.*.result, 'failure') }}
    # OR use the simpler canonical form:
    # if: failure()
    outputs:
      summary: ${{ steps.load_rca.outputs.summary }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Collect and Chunk Logs
        run: |
          bash .github/scripts/collect_logs.sh || true
          bash .github/scripts/chunk_logs.sh || true

      - name: Analyze with Groq AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: bash .github/scripts/ai_analyze_groq.sh || true

      - name: Load AI Summary
        id: load_rca
        shell: bash
        run: |
          if [ -f ai_summary.txt ]; then
            {
              echo "summary<<EOF"
              cat ai_summary.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "summary=AI analysis failed to generate a report." >> "$GITHUB_OUTPUT"
          fi

      - name: Upload AI RCA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-rca
          path: |
            ai_summary.txt
            logs.txt
            chunk_*

  # --- Stage 6: Centralized Notification ---
  notify_failure:
    name: Notify Teams
    needs: ai_log_analysis
    # Run if ai_log_analysis ran (success or failure), skip if it was skipped
    if: ${{ needs.ai_log_analysis.result == 'success' || needs.ai_log_analysis.result == 'failure' }}
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/notify.yml@gitops-migration
    with:
      project_name: ${{ github.repository }}
      component_name: "auth"
      job_name: "Pipeline Failure Analysis"
      status: "failure"
      rca: ${{ needs.ai_log_analysis.outputs.summary }}
    # If the central repo owns WEBHOOK_URL internally, you can remove this mapping:
    secrets:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}