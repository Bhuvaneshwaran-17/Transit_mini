name: Backend CI (Monorepo)

on:
  pull_request:
  push:
    branches:
      - main
      - gitops-migration

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test - ${{ matrix.svc.name }}
    strategy:
      fail-fast: false
      matrix:
        svc: &services
          - name: auth
            pom_path: Auth/apps/pom.xml
            workdir: Auth/apps
            sonar_key: apps
            dockerfile: Auth/apps/Dockerfile
            image_name: auth
            manifest: k8s/auth.yaml
            regex: "^[[:space:]]*image:[[:space:]]*172\\.27\\.186\\.119:4510\\/auth:"
          - name: tap
            pom_path: Tap/transport/pom.xml
            workdir: Tap/transport
            sonar_key: transport
            dockerfile: Tap/transport/Dockerfile
            image_name: tap
            manifest: k8s/tap.yaml
            regex: "^[[:space:]]*image:[[:space:]]*172\\.27\\.186\\.119:4510\\/tap:"
          - name: transitcard
            pom_path: TransitCard/TransitCard/pom.xml
            workdir: TransitCard/TransitCard
            sonar_key: Transitcard
            dockerfile: TransitCard/TransitCard/Dockerfile
            image_name: transitcard
            manifest: k8s/transitcard.yaml
            regex: "^[[:space:]]*image:[[:space:]]*172\\.27\\.186\\.119:4510\\/transitcard:"

    # Use the updated reusable TEST workflow from the same branch in the central repo
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-test.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      reports_artifact_name: test-reports-${{ matrix.svc.name }}
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  sonar:
    name: Sonar - ${{ matrix.svc.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/sonarqube-analysis.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      workdir: ${{ matrix.svc.workdir }}
      sonar_project_key: ${{ matrix.svc.sonar_key }}
      run_quality_gate: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORG_KEY: ${{ secrets.SONAR_ORG_KEY }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  build:
    name: Build - ${{ matrix.svc.name }}
    needs: sonar
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-build.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      build_command: "mvn -B clean package -DskipTests"
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  docker:
    name: Docker - ${{ matrix.svc.name }}
    needs: build
    permissions:
      contents: write
      security-events: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        svc: *services

    # Use the updated reusable DOCKER+GITOPS workflow from the same branch in central repo
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/docker-build-push.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      image_name: ${{ matrix.svc.image_name }}      # auth/tap/transitcard
      context: ${{ matrix.svc.workdir }}
      dockerfile: ${{ matrix.svc.dockerfile }}

      # 🚀 Enable full E2E from branch AND main (build+push+GitOps manifest update)
      push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}
      update_manifests: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}

      manifest_file: ${{ matrix.svc.manifest }}
      manifest_image_regex: ${{ matrix.svc.regex }}
    secrets:
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}          # 172.27.186.119:4510
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      LOCAL_ECR_CA: ${{ secrets.LOCAL_ECR_CA }} 