name: Backend CI (Monorepo)

on:
  pull_request:
  push:
    branches:
      - main
      - gitops-migration

permissions:
  contents: write
  packages: write
  security-events: write
  pull-requests: write
  actions: read # Required to fetch logs via GH CLI

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Stage 1: Testing ---
  test:
    name: Test - ${{ matrix.svc.name }}
    strategy:
      fail-fast: false
      matrix:
        svc: &services
          - name: auth
            pom_path: Auth/apps/pom.xml
            workdir: Auth/apps
            sonar_key: apps
            dockerfile: Auth/apps/Dockerfile
            image_name: auth
            manifest: auth.yaml
            regex: "image:.*/auth:"
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-test.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      reports_artifact_name: test-reports-${{ matrix.svc.name }}
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 2: Quality (Only on Main) ---
  sonar:
    name: Sonar - ${{ matrix.svc.name }}
    needs: test
    if: ${{ github.ref == 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/sonarqube-analysis.yml@gitops-migration
    with:
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      workdir: ${{ matrix.svc.workdir }}
      sonar_project_key: ${{ matrix.svc.sonar_key }}
      run_quality_gate: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORG_KEY: ${{ secrets.SONAR_ORG_KEY }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 3: Build Artifacts ---
  build:
    name: Build - ${{ matrix.svc.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/java-build.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      java_version: "21"
      pom_path: ${{ matrix.svc.pom_path }}
      build_command: "mvn -B clean package -DskipTests"
    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

  # --- Stage 4: Docker & GitOps ---
  docker:
    name: Docker - ${{ matrix.svc.name }}
    needs: build
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        svc: *services
    uses: Bhuvaneshwaran-17/Modularized-dev-ops/.github/workflows/docker-build-push.yml@gitops-migration
    with:
      project_name: ${{ matrix.svc.name }}
      image_name: ${{ matrix.svc.image_name }}
      context: ${{ matrix.svc.workdir }}
      dockerfile: ${{ matrix.svc.dockerfile }}
      push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}
      update_manifests: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/gitops-migration') }}
      manifest_file: ${{ matrix.svc.manifest }}
      manifest_image_regex: ${{ matrix.svc.regex }}
    secrets:
      REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      TEAMS_WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      LOCAL_ECR_CA: ${{ secrets.LOCAL_ECR_CA }}

  # --- Stage 5: AI RCA Analysis ---
    # --- Stage 5: AI RCA Analysis ---
  ai_log_analysis:
    name: AI Root-Cause Analysis
    runs-on: [ self-hosted, linux ]
    needs: [ test, sonar, build, docker ]
    if: ${{ always() && !cancelled() && contains(needs.*.result, 'failure') }}
    outputs:
      summary: ${{ steps.load_rca.outputs.summary }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Local Build Logs (Bypass GH CLI)
        run: |
          echo "==== CAPTURING LOCAL RUNNER LOGS ===="
          # Locate the maven_output.log from the failed service workspace
          # We search the Auth/apps directory or the root
          LOCAL_LOG=$(find . -name "maven_output.log" -not -path "*/target/*" | head -n 1)

          if [ -n "$LOCAL_LOG" ] && [ -s "$LOCAL_LOG" ]; then
            cp "$LOCAL_LOG" maven_output.log
            echo "Successfully captured local logs from: $LOCAL_LOG"
          else
            echo "Local maven_output.log not found. Attempting to capture tail of runner workspace..."
            # Fallback: Capture the last 500 lines of the current workspace logs
            tail -n 500 logs.txt > maven_output.log 2>/dev/null || echo "No logs accessible." > maven_output.log
          fi

          echo "Log file size: $(wc -c < maven_output.log) bytes"

      - name: AI RCA with Copilot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use the strict Copilot script
          bash .github/scripts/ai_analyze.sh

      - name: Load AI Summary
        id: load_rca
        shell: bash
        run: |
          if [ -s ai_summary.txt ]; then
            # CRITICAL: Strip ANSI color codes that break Teams/GitHub outputs
            sed -i 's/\x1b\[[0-9;]*m//g' ai_summary.txt
            echo "AI Summary found. Loading to output."
            {
              echo "summary<<EOF"
              cat ai_summary.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "summary=RCA could not identify the specific cause. Check raw logs." >> "$GITHUB_OUTPUT"
          fi

      - name: Upload AI RCA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-rca
          path: |
            ai_summary.txt
            maven_output.log

  # --- Stage 6: Centralized Notification ---
  notify_failure:
    name: Notify Teams
    needs: ai_log_analysis
    if: |
      always() && 
      needs.ai_log_analysis.result != 'skipped' && 
      needs.ai_log_analysis.result != 'cancelled'
    uses: Bhuvaneshwaran-17/central-devops-tooling/.github/workflows/teams-notifier.yml@main
    with:
      project_name: ${{ github.repository }}
      component_name: "auth"
      job_name: "Pipeline Failure Analysis"
      status: "failure"
      rca: ${{ needs.ai_log_analysis.outputs.summary }}
    secrets:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}