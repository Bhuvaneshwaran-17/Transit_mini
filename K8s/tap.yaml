apiVersion: apps/v1
kind: Deployment
metadata:
  name: tap
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tap
  template:
    metadata:
      labels:
        app: tap
    spec:
      containers:
      - name: tap
        image: 172.27.186.119:4510/tap:v1.0.0
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: tap
  namespace: apps
spec:
  selector:
    app: tap
  ports:
  - port: 80
    targetPort: 8081
